<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <title>Api Simples</title>
  </head>
  <body class="text-center" style="background-color: yellowgreen">
    <div
      class="container text-center p-5 mt-5 border border-2"
      style="background-color: wheat; border-radius: 7px"
    >
      <div class="row mt-5">
        <div class="col-12">
          <h1 class="p-2" style="font-family: Arial, Helvetica, sans-serif">
            Faça seu cadastro.
          </h1>
        </div>
        <div class="col-6">
          <div>
            <label class="p-2 mt-2" for="nome">Nome: </label>
            <input type="text" name="nome" id="nome" />
          </div>
        </div>
        <div class="col-6">
          <label class="p-2 mt-3" for="idade">Idade</label>
          <input type="text" name="idade" id="idade" />
        </div>

        <div class="col-6">
          <div>
            <label class="p-2" for="cep">CEP:</label>
            <input oninput="lognumero()" type="text" name="cep" id="cep" />
          </div>
          <div>
            <label class="p-2" for="cep">Rua:</label>
            <input type="text" name="rua" id="rua" />
          </div>
          <div>
            <label class="p-2" for="cep">Complemento:</label>
            <input type="text" name="complemento" id="complemento" />
          </div>

          <div>
            <label class="p-2" for="cep">Estado:</label>
            <input type="text" name="estado" id="estado" />
          </div>
        </div>
        <div class="col-6">
          <div>
            <label class="p-2" for="cep">Cidade:</label>
            <input type="text" name="cidade" id="cidade" />
          </div>
          <div>
            <label class="p-2" for="cep">Estado:</label>
            <input type="text" name="estado" id="estado" />
          </div>
          <div>
            <label class="p-2" for="cep">Região:</label>
            <input type="text" name="regiao" id="regiao" />
          </div>
        </div>
      </div>
    </div>

    <script src="api.js"></script>
  </body>
</html>
